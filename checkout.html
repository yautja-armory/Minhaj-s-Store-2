<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - My Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <nav class="navbar" style="justify-content: center; padding: 20px 0; border-bottom: 1px solid #333;">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: white; font-weight: 600; letter-spacing: 2px;">MY STORE</a></div>
    </nav>

    <div class="checkout-container" style="max-width: 1100px; margin: 40px auto; padding: 0 20px;">
        <div class="checkout-layout" style="display: flex; gap: 40px; flex-wrap: wrap;">
            
            <div class="checkout-form" style="flex: 1; min-width: 300px;">
                <h2 style="margin-bottom: 30px;">Contact & Shipping</h2>
                <form id="order-form" action="https://formspree.io/f/mreokbyj" method="POST">
                    
                    <input type="email" name="Customer Email" placeholder="Email address" class="dark-input full-width" required style="width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: white;">
                    
                    <div class="input-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
                        <input type="text" name="First Name" placeholder="First name" class="dark-input" required style="flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white;">
                        <input type="text" name="Last Name" placeholder="Last name" class="dark-input" required style="flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white;">
                    </div>

                    <input type="text" name="Address" placeholder="Address" class="dark-input full-width" required style="width: 100%; padding: 15px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: white;">
                    
                    <div class="input-row" style="display: flex; gap: 15px; margin-bottom: 15px;">
                        <input type="text" name="City" placeholder="City" class="dark-input" required style="flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white;">
                        <input type="text" name="Phone" placeholder="Phone number" class="dark-input" required style="flex: 1; padding: 15px; background: #1a1a1a; border: 1px solid #333; color: white;">
                    </div>

                    <input type="hidden" name="Order Summary Details" id="hidden-cart-data">

                    <h2 style="margin-top: 40px; margin-bottom: 20px;">Payment</h2>
                    <div class="payment-box" style="padding: 20px; border: 1px solid #444; border-radius: 4px; background: #222;">
                        <p style="margin: 0; color: #fff;">Cash on Delivery (COD)</p>
                    </div>

                    <button type="submit" class="btn btn-white" style="width: 100%; margin-top: 30px; height: 55px; font-weight: 600; cursor: pointer; background: #fff; color: #000; border: none; font-size: 16px;">Complete Order</button>
                </form>
            </div>

            <div class="order-summary" style="flex: 0.8; min-width: 300px; background: #1a1a1a; padding: 30px; border-radius: 8px;">
                <h3 style="margin-top: 0; border-bottom: 1px solid #333; padding-bottom: 15px;">Order Summary</h3>
                
                <div id="checkout-items-list">
                    </div>

                <div class="summary-total" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 20px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px; color: #888;">
                        <span>Subtotal</span>
                        <span id="check-subtotal">Rs. 0</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 20px; font-weight: 600; color: #fff; margin-top: 15px;">
                        <span>Total</span>
                        <span id="check-total">Rs. 0</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        window.onload = function() {
            const container = document.getElementById('checkout-items-list');
            const subtotalEl = document.getElementById('check-subtotal');
            const totalEl = document.getElementById('check-total');
            const hiddenInput = document.getElementById('hidden-cart-data');

            // 1. LocalStorage se latest data lena
            const cartData = JSON.parse(localStorage.getItem('userCart')) || [];

            if (cartData.length === 0) {
                container.innerHTML = '<p style="color: #888;">Your cart is empty.</p>';
            } else {
                let grandTotal = 0;
                let summaryForEmail = "NEW ORDER RECEIVED: \n\n"; 
                container.innerHTML = ''; 

                cartData.forEach((item, index) => {
                    // Logic: Price ko Quantity se multiply karna
                    const itemTotal = item.price * item.quantity;
                    grandTotal += itemTotal;
                    
                    summaryForEmail += `${index + 1}. ${item.name} (Qty: ${item.quantity}) - Rs. ${itemTotal.toLocaleString()} \n`;

                    container.innerHTML += `
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px;">
                            <div style="width: 65px; height: 65px; flex-shrink: 0; border-radius: 6px; overflow: hidden; border: 1px solid #444;">
                                <img src="${item.image}" style="width: 100%; height: 100%; object-fit: cover;">
                            </div>
                            <div style="flex: 1;">
                                <p style="margin: 0; font-size: 14px; color: #fff; font-weight: 600;">${item.name}</p>
                                <p style="margin: 5px 0 0 0; font-size: 13px; color: #888;">Qty: ${item.quantity} x Rs. ${item.price.toLocaleString()}</p>
                            </div>
                            <div style="text-align: right;">
                                <p style="margin: 0; font-size: 14px; color: #fff; font-weight: 600;">Rs. ${itemTotal.toLocaleString()}</p>
                            </div>
                        </div>
                    `;
                });

                subtotalEl.innerText = "Rs. " + grandTotal.toLocaleString();
                totalEl.innerText = "Rs. " + grandTotal.toLocaleString();
                
                summaryForEmail += `\n--- \nGRAND TOTAL TO COLLECT: Rs. ${grandTotal.toLocaleString()}`;
                hiddenInput.value = summaryForEmail;
            }

            // Order hone ke baad Cart khali karna
            document.getElementById('order-form').onsubmit = function() {
                setTimeout(() => {
                    localStorage.removeItem('userCart');
                }, 1000);
            };
        };
    </script>
</body>
</html>
