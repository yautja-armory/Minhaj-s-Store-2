<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - My Store</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <nav class="navbar" style="justify-content: center;">
        <div class="logo"><a href="index.html" style="text-decoration: none; color: white;">MY STORE</a></div>
    </nav>

    <div class="checkout-container">
        <div class="checkout-layout">
            
            <div class="checkout-form">
                <h2>Contact & Shipping</h2>
                <form id="order-form" action="https://formspree.io/f/mreokbyj" method="POST">
                    
                    <input type="email" name="Customer Email" placeholder="Email address" class="dark-input full-width" required>
                    
                    <div class="input-row">
                        <input type="text" name="First Name" placeholder="First name" class="dark-input" required>
                        <input type="text" name="Last Name" placeholder="Last name" class="dark-input" required>
                    </div>

                    <input type="text" name="Address" placeholder="Address" class="dark-input full-width" required>
                    
                    <div class="input-row">
                        <input type="text" name="City" placeholder="City" class="dark-input" required>
                        <input type="text" name="Postal Code" placeholder="Postal code" class="dark-input">
                    </div>

                    <input type="tel" name="Phone Number" placeholder="Phone number" class="dark-input full-width" required>

                    <input type="hidden" name="Order Summary Details" id="hidden-cart-data">

                    <h2 style="margin-top: 40px;">Payment</h2>
                    <div class="payment-box">
                        <p>Cash on Delivery (COD)</p>
                    </div>

                    <button type="submit" class="btn btn-white" style="width: 100%; margin-top: 30px; height: 50px; font-weight: 600; cursor: pointer;">Complete Order</button>
                </form>
            </div>

            <div class="order-summary">
                <h3>Order Summary</h3>
                <div id="checkout-items-list" style="margin-bottom: 20px;">
                    </div>

                <div class="summary-total">
                    <div class="row"><span>Subtotal</span><span id="check-subtotal">Rs. 0</span></div>
                    <div class="row"><span>Shipping</span><span>FREE</span></div>
                    <div class="row total"><span>Total</span><span id="check-total" style="font-size: 22px; color: #fff;">Rs. 0</span></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        window.onload = function() {
            const container = document.getElementById('checkout-items-list');
            const subtotalEl = document.getElementById('check-subtotal');
            const totalEl = document.getElementById('check-total');
            const hiddenInput = document.getElementById('hidden-cart-data');
            const orderForm = document.getElementById('order-form');

            const cartData = JSON.parse(localStorage.getItem('userCart')) || [];

            if (cartData.length === 0) {
                container.innerHTML = '<p style="color: #888;">Your cart is empty.</p>';
            } else {
                let grandTotal = 0;
                let summaryForEmail = ""; 
                container.innerHTML = ''; 

                cartData.forEach((item, index) => {
                    grandTotal += item.price;
                    summaryForEmail += `${index + 1}. ${item.name} - Rs. ${item.price} \n`;

                    container.innerHTML += `
                        <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                            <div style="width: 60px; height: 60px; flex-shrink: 0; border-radius: 4px; overflow: hidden; border: 1px solid #444;">
                                <img src="${item.image}" style="width: 100%; height: 100%; object-fit: cover;">
                            </div>
                            <div style="flex: 1;">
                                <p style="margin: 0; font-size: 14px; color: #fff;">${item.name}</p>
                                <p style="margin: 3px 0 0 0; font-size: 13px; color: #888;">Rs. ${item.price.toLocaleString()}</p>
                            </div>
                        </div>
                    `;
                });

                subtotalEl.innerText = "Rs. " + grandTotal.toLocaleString();
                totalEl.innerText = "Rs. " + grandTotal.toLocaleString();
                
                summaryForEmail += `\n--- \nGRAND TOTAL: Rs. ${grandTotal}`;
                hiddenInput.value = summaryForEmail;
            }

            // Form submit hone par LocalStorage clear karna
            orderForm.onsubmit = function() {
                // Customer ko Success page par bhejne se pehle cart clear karein
                setTimeout(() => {
                    localStorage.removeItem('userCart');
                }, 1000);
            };
        };
    </script>
</body>
</html>
